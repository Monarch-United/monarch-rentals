backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

  # ── PROPERTIES ────────────────────────────────────────────────
  - name: "properties"
    label: "Properties"
    label_singular: "Property"
    folder: "_data/properties"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: "Property Address", name: "address", widget: "string", hint: "Full address e.g. 123 Lookout Lane, Chattanooga, TN 37403 — used to plot the map pin automatically" }
      - { label: "Display Label", name: "label", widget: "string", hint: "Short name shown on the map pin and card e.g. Lookout Lane" }
      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Available — green pin, Schedule a Viewing button shown", value: "vacant" }
          - { label: "Occupied — amber pin, no scheduling button", value: "occupied" }
          - { label: "Off Market — gray pin, no scheduling button", value: "offmarket" }
        default: "vacant"
      - label: "Property Type"
        name: "type"
        widget: "select"
        options:
          - { label: "Single Home", value: "single" }
          - { label: "Multi-Unit", value: "multi" }
          - { label: "Apartment Complex", value: "apartment" }
        default: "single"
      - { label: "Monthly Rent", name: "rent", widget: "string", hint: "e.g. $1,850/mo" }
      - { label: "Bedrooms", name: "beds", widget: "number", value_type: "int", min: 1, max: 20 }
      - { label: "Bathrooms", name: "baths", widget: "number", value_type: "float", min: 1, max: 20, step: 0.5 }
      - { label: "Square Footage", name: "sqft", widget: "string", hint: "e.g. 1,450 sqft" }
      - { label: "Property Photo", name: "photo", widget: "image", required: false, hint: "Main photo shown on the listing card — recommended 800x600px or wider" }
      - { label: "Description", name: "description", widget: "text", required: false, hint: "2-3 sentences about the property — shown on the listing card" }

  # ── TEAM MEMBERS ──────────────────────────────────────────────
  - name: "team"
    label: "Team Members"
    label_singular: "Team Member"
    folder: "_data/team"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: "Full Name", name: "name", widget: "string" }
      - { label: "Role / Title", name: "role", widget: "string", hint: "e.g. Founder & Principal" }
      - { label: "Headshot or Team Photo", name: "photo", widget: "image", required: false, hint: "Shown in the About section — square or portrait crop works best" }
      - { label: "Bio", name: "bio", widget: "text", required: false, hint: "1-2 sentences shown under your name in the About section" }

  # ── SITE SETTINGS ─────────────────────────────────────────────
  - name: "settings"
    label: "Site Settings"
    files:

      - label: "Logos"
        name: "branding"
        file: "_data/settings/branding.yml"
        fields:
          - label: "Main Logo — Transparent PNG"
            name: "logo_main"
            widget: "image"
            required: false
            hint: "Appears in: Top of webpage (nav bar), Hamburger dropdown menu, Footer. Upload as transparent background PNG."
          - label: "Favicon — Crown-Key Icon Only"
            name: "favicon"
            widget: "image"
            required: false
            hint: "Shown in the browser tab only. Square PNG, ideally 512x512px. Export just the crown-key icon from Illustrator."
          - label: "Logo — Light Background Version"
            name: "logo_light"
            widget: "image"
            required: false
            hint: "Held in reserve for print materials and letterhead. Not currently displayed on the website."

      - label: "Hero Section"
        name: "hero"
        file: "_data/settings/hero.yml"
        fields:
          - { label: "Headline", name: "headline", widget: "string", default: "Your home. Our name on it.", hint: "The large headline on the tenant homepage" }
          - { label: "Subheading", name: "subheading", widget: "text", hint: "The paragraph beneath the headline" }
          - { label: "Hero Background Image", name: "hero_image", widget: "image", required: false, hint: "Full-bleed photo on the right side of the hero — minimum 1200px wide" }

      - label: "Contact Info"
        name: "contact"
        file: "_data/settings/contact.yml"
        fields:
          - { label: "Phone Number", name: "phone", widget: "string", required: false, hint: "Displayed in the contact section if filled in" }
          - { label: "Email Address", name: "email", widget: "string", required: false }
          - { label: "Location", name: "location", widget: "string", default: "Chattanooga, Tennessee" }
